<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>My first Collage</h1>
        <section class="row">
            <section class = "first-row">
                <div class="first-image">
                    <img src="Images/A.jpg" alt="">
                </div>
            </section>
            <section class="second-row">
                <div class="second-row-images"><img src="Images/B.jpg" alt=""></div>
                <div class="second-row-images"><img src="Images/C.jpg" alt=""></div>
                <div class="first-division">
                    <div class="second-row-images"><img src="Images/D.jpg" alt=""></div>
                    <div class="second-row-images"><img src="Images/E.jpg" alt=""></div>
                </div>
            </section>
            <section class="third-row">
                <div class="third-row-images"><img src="Images/F.jpg" alt=""></div>
                <div class="second-division">
                    <div class="third-row-images"><img src="Images/G.jpg" alt=""></div>
                    <div class="third-row-images"><img src="Images/G.jpg" alt=""></div>
                    <div class="third-row-images"><img src="Images/G.jpg" alt=""></div>
                    <div class="third-row-images"><img src="Images/G.jpg" alt=""></div>
                </div>
                <div class="third-row-images"><img src="Images/I.jpg" alt=""></div>

            </section>
        </section>
    </header>
</body>
</html>
