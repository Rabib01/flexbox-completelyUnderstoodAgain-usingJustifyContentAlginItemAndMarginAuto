<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calendar</title>
    <style>
        .calendar, .week{
            display:grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 20px;
            column-gap: 20px;
            margin-bottom: 20px;
        }
        
        .days, .week-days{
            background-color: skyblue;
            /* width: 50px; */
            height:50px;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        .week-days{
            background-color: lightgrey;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div class="week">
        <div class="week-days">S</div>
        <div class="week-days">M</div>
        <div class="week-days">T</div>
        <div class="week-days">W</div>
        <div class="week-days">T</div>
        <div class="week-days">F</div>
        <div class="week-days">S</div>
    </div>
    <div class="calendar">
        <div class="days">29</div>
        <div class="days">30</div>
        <div class="days">1</div>
        <div class="days">2</div>

        <div class="days">18</div>

        <div class="days">21</div>
        <div class="days">22</div>

</body>
</html>
